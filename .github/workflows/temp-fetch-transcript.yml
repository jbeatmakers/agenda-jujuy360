name: Temporary Whisper model fetch

on:
  pull_request:
    paths:
      - 'TEMP_TRANSCRIPT_TRIGGER'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch faster-whisper small model
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p faster-whisper-small
          base='https://huggingface.co/Systran/faster-whisper-small/resolve/main'
          for file in config.json model.bin tokenizer.json vocabulary.txt; do
            curl --fail --location --retry 5 --retry-all-errors "$base/$file" --output "faster-whisper-small/$file"
          done
          test -s faster-whisper-small/model.bin
          sha256sum faster-whisper-small/model.bin
          du -sh faster-whisper-small

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: faster-whisper-small
          path: faster-whisper-small
          if-no-files-found: error
          compression-level: 0
          retention-days: 1
